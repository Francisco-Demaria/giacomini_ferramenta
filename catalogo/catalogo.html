<!DOCTYPE html>
<html lang="pt-BR">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Completo | Giacomini</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="catalogo.css">
</head>
<body>

    <header>
        <a href="../index.html" class="logo-container">
            <img src="../images.jfif" alt="Giacomini" class="logo-img" onerror="this.src='../padrao.png'">
            <span class="logo-texto">Giacomini</span>
        </a>
        <a href="../carrinho/carrinho.html" class="icone-carrinho-topo" title="Ir para o Carrinho">
            <i class="fas fa-shopping-cart"></i>
            <span id="contador-carrinho" class="badge-carrinho">0</span>
        </a>
    </header>

    <select onchange="ordenarProdutos(this.value)" style="padding: 10px; border-radius: 5px;">
        <option value="">Ordenar por...</option>
        <option value="menor-preco">Menor Preço</option>
        <option value="maior-preco">Maior Preço</option>
        <option value="a-z">Ordem Alfabética</option>
    </select>

    <div class="faixa-pesquisa">
        <div class="box-pesquisa">
            <input type="text" id="input-busca" placeholder="Buscar no catálogo..." onkeypress="if(event.key === 'Enter') fazerBusca()">
            <button onclick="fazerBusca()"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <main>
        <div style="max-width: 1200px; margin: 0 auto; padding: 20px 20px 0 20px;">
            <a href="../index.html" class="btn-voltar">← Voltar para a Loja</a>
        </div>

        <div class="layout-catalogo">
            <aside class="menu-lateral-filtros" style="padding: 15px; background: #fff; border-radius: 8px; border: 1px solid #ddd;">
                <h3 style="margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Filtros</h3>
                
                <div style="margin-bottom: 20px;">
                    <h4 style="margin-bottom: 10px; font-size: 0.9em; color: #555;">Ordenar por</h4>
                    <select id="filtro-ordem" onchange="aplicarSuperFiltro()" style="width: 100%; padding: 8px; border-radius: 5px;">
                        <option value="relevantes">Mais Relevantes</option>
                        <option value="menor-preco">Menor Preço</option>
                        <option value="maior-preco">Maior Preço</option>
                    </select>
                </div>
            
                <div style="margin-bottom: 20px;">
                    <h4 style="margin-bottom: 10px; font-size: 0.9em; color: #555;">Categorias</h4>
                    <label style="display: block; margin-bottom: 5px;"><input type="radio" name="cat" value="todas" checked onchange="aplicarSuperFiltro()"> Todas</label>
                    <label style="display: block; margin-bottom: 5px;"><input type="radio" name="cat" value="maquina" onchange="aplicarSuperFiltro()"> Máquinas</label>
                    <label style="display: block; margin-bottom: 5px;"><input type="radio" name="cat" value="peca" onchange="aplicarSuperFiltro()"> Peças</label>
                    <label style="display: block; margin-bottom: 5px;"><input type="radio" name="cat" value="outdoor" onchange="aplicarSuperFiltro()"> Linha Outdoor</label>
                </div>
            
                <div style="margin-bottom: 20px;">
                    <h4 style="margin-bottom: 10px; font-size: 0.9em; color: #555;">Voltagem (Bateria)</h4>
                    <label style="display: block; margin-bottom: 5px;"><input type="radio" name="bat" value="todas" checked onchange="aplicarSuperFiltro()"> Todas</label>
                    <label style="display: block; margin-bottom: 5px;"><input type="radio" name="bat" value="40v" onchange="aplicarSuperFiltro()"> 40V</label>
                    <label style="display: block; margin-bottom: 5px;"><input type="radio" name="bat" value="18v" onchange="aplicarSuperFiltro()"> 18V</label>
                    <label style="display: block; margin-bottom: 5px;"><input type="radio" name="bat" value="12v" onchange="aplicarSuperFiltro()"> 12V</label>
                    <label style="display: block; margin-bottom: 5px;"><input type="radio" name="bat" value="7.2v" onchange="aplicarSuperFiltro()"> 7.2V</label>
                </div>
            </aside>

            <section class="conteudo-principal">
                
                <div id="sessao-maquinas" style="display: block;">
                    <div id="filtros-subcategoria" class="container-filtros"></div>
                    <div id="lista-maquinas" class="grid-produtos"></div>
                </div>

                <div id="sessao-pecas" style="display: none;">
                    <div id="container-grupos-pecas"></div>
                </div>

            </section>
        </div>
    </main>

    <script src="catalogo.js"></script>
</body>
</html>
