<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Completo | Giacomini</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="catalogo.css">
</head>
<body>

    <header>
        <a href="../index.html" class="logo-container">
            <img src="../images.jfif" alt="Giacomini" class="logo-img" onerror="this.src='../padrao.png'">
            <span class="logo-texto">Giacomini</span>
        </a>
        <a href="../carrinho/carrinho.html" class="icone-carrinho-topo" title="Ir para o Carrinho">
            <i class="fas fa-shopping-cart"></i>
            <span id="contador-carrinho" class="badge-carrinho">0</span>
        </a>
    </header>

    <div class="faixa-pesquisa">
        <div class="box-pesquisa">
            <input type="text" id="input-busca" placeholder="Buscar no catálogo..." onkeypress="if(event.key === 'Enter') fazerBusca()">
            <button onclick="fazerBusca()"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <main>
        <div style="max-width: 1200px; margin: 0 auto; padding: 20px 20px 0 20px;">
            <a href="../index.html" class="btn-voltar">← Voltar para a Loja</a>
        </div>

        <div class="layout-catalogo">
            <aside class="menu-lateral-filtros">
                <h3>Categorias</h3>
                <ul class="lista-filtros">
                    <li><button onclick="mudarCatalogo('maquinas')" id="btn-maquinas" class="btn-filtro ativo">Máquinas e Ferramentas</button></li>
                    <li><button onclick="mudarCatalogo('pecas')" id="btn-pecas" class="btn-filtro">Peças de Reposição</button></li>
                </ul>
            </aside>

            <section class="conteudo-principal">
                
                <div id="sessao-maquinas" style="display: block;">
                    <div id="lista-maquinas" class="grid-produtos"></div>
                </div>

                <div id="sessao-pecas" style="display: none;">
                    <div id="container-grupos-pecas"></div>
                </div>

            </section>
        </div>
    </main>

    <script src="catalogo.js"></script>
</body>
</html>
