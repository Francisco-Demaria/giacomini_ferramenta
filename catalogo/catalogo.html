<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Completo | Giacomini</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="catalogo.css">
</head>
<body>

    <header>

        <nav id="menu-lateral" class="gaveta">
            <div class="gaveta-header">
                <h2>Navegação</h2>
                <button class="btn-fechar-menu" onclick="fecharMenu()"><i class="fas fa-times"></i></button>
            </div>
            <div class="menu-links">
                <a href="../index.html"><i class="fas fa-home"></i> Início</a>
                <a href="../sobre/sobre.html"><i class="fas fa-industry"></i> Quem Somos</a>
                <a href="../catalogo/catalogo.html"><i class="fas fa-tools"></i> Catálogo Completo</a>
                <a href="../carrinho/carrinho.html"><i class="fas fa-shopping-cart"></i> Meu Carrinho</a>
                <a href="https://wa.me/5547989050263" target="_blank"><i class="fab fa-whatsapp"></i> Assistência Técnica</a>
            </div>
        </nav>

        <a href="../index.html" class="logo-container">
            <img src="../images.jfif" alt="Giacomini" class="logo-img" onerror="this.src='../padrao.png'">
            <span class="logo-texto">Giacomini</span>
        </a>

        <a href="../carrinho/carrinho.html" class="icone-carrinho-topo" title="Ir para o Carrinho">
            <i class="fas fa-shopping-cart"></i>
            <span id="contador-carrinho" class="badge-carrinho">0</span>
        </a>
        <button class="btn-menu" onclick="abrirMenu()">
            <i class="fas fa-bars" style="font-size: 1.5em;"></i> Menu
        </button>
    </header>

    <div class="faixa-pesquisa">
        <div class="box-pesquisa">
            <input type="text" id="input-busca" placeholder="Buscar no catálogo..." onkeypress="if(event.key === 'Enter') fazerBusca()">
            <button onclick="fazerBusca()"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <main>
        <div style="max-width: 1200px; margin: 0 auto; padding: 20px 20px 0 20px;">
            <a href="../index.html" class="btn-voltar">← Voltar para a Loja</a>
        </div>

        <div class="layout-catalogo">
          <aside class="menu-lateral-filtros">
                <h3 style="margin-bottom: 15px; font-size: 1.2em; border-bottom: 2px solid #eee; padding-bottom: 10px;">Filtros</h3>

                <div class="grupo-filtro">
                    <h4>Faixa de Preço (R$)</h4>
                    <div style="display: flex; gap: 5px; align-items: center; margin-bottom: 10px;">
                        <input type="number" id="preco-min" placeholder="Mín" style="width: 45%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" onchange="aplicarSuperFiltro()">
                        <span style="color: #666;">-</span>
                        <input type="number" id="preco-max" placeholder="Máx" style="width: 45%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" onchange="aplicarSuperFiltro()">
                    </div>
                </div>

                <div class="grupo-filtro">
                    <h4>Ordenar por</h4>
                    <select id="filtro-ordem" onchange="aplicarSuperFiltro()">
                        <option value="relevantes">Mais Relevantes</option>
                        <option value="menor-preco">Menor Preço</option>
                        <option value="maior-preco">Maior Preço</option>
                    </select>
                </div>

                <div class="grupo-filtro">
                    <h4>Categorias</h4>
                    <label><input type="radio" name="cat" value="todas" checked onchange="aplicarSuperFiltro()"> Todas</label>
                    <label><input type="radio" name="cat" value="maquina" onchange="aplicarSuperFiltro()"> Máquinas e Ferramentas</label>
                    <label><input type="radio" name="cat" value="acessorio" onchange="aplicarSuperFiltro()"> Acessórios</label>
                    <label><input type="radio" name="cat" value="outdoor" onchange="aplicarSuperFiltro()"> Linha Outdoor</label>
                    <label><input type="radio" name="cat" value="peca" onchange="aplicarSuperFiltro()"> Peças (Distribuição)</label>
                </div>

                <div class="grupo-filtro">
                    <h4>Voltagem (Bateria)</h4>
                    <label><input type="radio" name="bat" value="todas" checked onchange="aplicarSuperFiltro()"> Todas</label>
                    <label><input type="radio" name="bat" value="40v" onchange="aplicarSuperFiltro()"> 40V</label>
                    <label><input type="radio" name="bat" value="18v" onchange="aplicarSuperFiltro()"> 18V</label>
                    <label><input type="radio" name="bat" value="12v" onchange="aplicarSuperFiltro()"> 12V</label>
                    <label><input type="radio" name="bat" value="7.2v" onchange="aplicarSuperFiltro()"> 7.2V</label>
                </div>
            </aside>
            <section class="conteudo-principal">
                
                <div id="sessao-maquinas" style="display: block;">
                    <div id="lista-maquinas" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; width: 100%;"></div>
                </div>

                <div id="sessao-pecas" style="display: none;">
                    <div id="container-grupos-pecas"></div>
                </div>

            </section>
        </div>
    </main>

    <a href="https://wa.me/5547989050263" class="btn-zap-flutuante" target="_blank" title="Fale no WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="catalogo.js"></script>
</body>
</html>
